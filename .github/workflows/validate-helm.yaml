name: Validate HelmRelease values

on:
  pull_request:
    paths:
      - 'kubernetes/**'

jobs:
  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@v2.9.3

      - name: Validate HelmReleases
        uses: allenporter/flux-local/action/test@8.4.0
        with:
          enable-helm: true
          path: kubernetes
