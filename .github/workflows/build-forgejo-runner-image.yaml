name: Build forgejo-runner-image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "containerfiles/forgejo-runner-image/Containerfile"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: containerfiles/forgejo-runner-image
          file: containerfiles/forgejo-runner-image/Containerfile
          push: true
          tags: |
            ghcr.io/titusio/forgejo-runner-image:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
