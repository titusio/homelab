---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn-release
  namespace: longhorn-system
spec:
  chart:
    spec:
      chart: longhorn
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: longhorn-repo
      version: 1.10.2
  interval: 1m0s
  values:
    metrics:
      serviceMonitor:
        enabled: true
    persistence:
      defaultDataLocality: "best-effort"
      defaultClassReplicaCount: 2
