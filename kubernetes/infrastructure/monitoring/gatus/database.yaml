apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gatus-db
  namespace: monitoring
spec:
  instances: 2
  storage:
    size: 1Gi
  affinity:
    # corellia's cached postgresql:18.3 image is corrupt (exec format / I/O
    # errors); exclude it until the node's containerd cache is cleaned.
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                  - corellia
  bootstrap:
    initdb:
      database: gatus
      owner: gatus
      secret:
        name: gatus-db-credentials
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: gatus-db-backup
