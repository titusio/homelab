apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gatus-db
  namespace: monitoring
spec:
  instances: 1
  storage:
    size: 1Gi
  bootstrap:
    initdb:
      database: gatus
      owner: gatus
      secret:
        name: gatus-db-credentials
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: gatus-db-backup
