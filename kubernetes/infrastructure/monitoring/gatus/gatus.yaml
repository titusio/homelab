apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
  namespace: monitoring
spec:
  interval: 5m
  chart:
    spec:
      chart: gatus
      version: 1.5.0
      sourceRef:
        kind: HelmRepository
        name: gatus
        namespace: monitoring
  values:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    env:
      MATRIX_ACCESS_TOKEN:
        valueFrom:
          secretKeyRef:
            name: apprise-matrix-tokens
            key: MATRIX_TOKEN_UPTIME
    envFrom:
      - secretRef:
          name: gatus-db-credentials
    gateway:
      route:
        enabled: true
        parentRefs:
          - name: traefik-gateway
            namespace: traefik
        hosts:
          - uptime.tituslab.dev
        annotations:
          external-dns.alpha.kubernetes.io/controller: "ignore"
    config:
      ui:
        default-sort-by: group
      storage:
        type: postgres
        path: ${POSTGRES_URL}
      endpoints:
        - name: "🎬 Jellyfin"
          group: "Media"
          url: "https://jellyfin.tituslab.dev/health"
          conditions:
            - "[STATUS] == 200"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Jellyfin is down"
        - name: "🎫 Seerr"
          group: "Media"
          url: "https://requests.tituslab.dev/api/v1/status"
          conditions:
            - "[STATUS] == 200"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Seerr is down"
        - name: "🎧 Audiobookshelf"
          group: "Media"
          url: "https://audiobooks.tituslab.dev"
          conditions:
            - "[STATUS] == 200"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Audiobookshelf is down"
        - name: "🌍 Audiobooks External Access"
          group: "Media"
          url: "https://audiobooks.tituscloud.dev"
          conditions:
            - "[STATUS] == 200"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Audiobookshelf external access is down"
        - name: "🎬 Radarr"
          group: "Media"
          url: "https://radarr.tituslab.dev/radarr/ping"
          conditions:
            - "[STATUS] == 200"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Radarr is down"
        - name: "📺 Sonarr"
          group: "Media"
          url: "https://sonarr.tituslab.dev/sonarr/ping"
          conditions:
            - "[STATUS] == 200"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Sonarr is down"
        - name: "🔍 Prowlarr"
          group: "Media"
          url: "https://prowlarr.tituslab.dev/prowlarr/ping"
          conditions:
            - "[STATUS] == 200"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Prowlarr is down"
        - name: "⬇️ SABnzbd"
          group: "Media"
          url: "https://sabnzbd.tituslab.dev"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "SABnzbd is down"
        - name: "🎛️ Profilarr"
          group: "Media"
          url: "https://profiles.tituslab.dev"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Profilarr is down"
        - name: "🍽️ Mealie"
          group: "Home"
          url: "https://mealie.tituslab.dev"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Mealie is down"
        - name: "🌍 Mealie External Access"
          group: "Home"
          url: "https://mealie.tituscloud.dev"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Mealie external access is down"
        - name: "📸 Immich"
          group: "Photos"
          url: "https://photos.tituslab.dev/api/server/ping"
          conditions:
            - "[STATUS] == 200"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Immich is down"
        - name: "🔖 Karakeep"
          group: "Productivity"
          url: "https://karakeep.tituslab.dev"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Karakeep is down"
        - name: "📄 Paperless"
          group: "Productivity"
          url: "https://paperless.tituslab.dev"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Paperless is down"
        - name: "🔍 Change Detection"
          group: "Productivity"
          url: "https://changes.tituslab.dev"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Change Detection is down"
        - name: "🔎 Searxng"
          group: "Productivity"
          url: "https://search.tituslab.dev"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Searxng is down"
        - name: "🔐 Synapse Admin"
          group: "Communication"
          url: "https://madmin.titusio.net"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Synapse Admin is down"
        - name: "💬 Matrix"
          group: "Communication"
          url: "https://matrix.titusio.net"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Matrix homeserver is down"
        - name: "🟢 Element"
          group: "Communication"
          url: "https://chat.titusio.net"
          conditions:
            - "[STATUS] == 200"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Element is down"
        - name: "👤 Matrix Account Management"
          group: "Communication"
          url: "https://maccount.titusio.net"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Matrix account management is down"
        - name: "📁 Plik"
          group: "Cloud"
          url: "https://files.titusio.net"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Plik is down"
        - name: "☁️ Nextcloud"
          group: "Cloud"
          url: "https://cloud.titusio.net"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Nextcloud is down"
        - name: "✏️ Office"
          group: "Cloud"
          url: "https://office.titusio.net"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Nextcloud is down"

        - name: "🔑 Pocket ID"
          group: "Authentication"
          url: "https://it.titusio.net"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Pocket ID is down"
        - name: "🗄️ NAS"
          group: "Networking"
          url: "icmp://10.0.10.10"
          conditions:
            - "[CONNECTED] == true"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "NAS is down"
        - name: "🛡️ Pihole"
          group: "Networking"
          url: "https://pihole.tituslab.dev"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Pihole is down"
        - name: "🐙 Forgejo"
          group: "Source Control"
          url: "https://git.titusio.net"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Forgejo is down"
        - name: "📄 Paperless (Parents)"
          group: "External Proxy"
          url: "https://paperless.huebie.family"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Parents Paperless is down"
        - name: "📸 Immich (Parents)"
          group: "External Proxy"
          url: "https://immich.huebie.family"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Parents Immich is down"
        - name: "🏠 Home Assistant (Parents)"
          group: "External Proxy"
          url: "https://home.huebie.family"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Parents Home Assistant is down"
        - name: "☁️ Nextcloud (Parents)"
          group: "External Proxy"
          url: "https://nextcloud.huebie.family"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Parents Nextcloud is down"
        - name: "📧 Mail Archive (Parents)"
          group: "External Proxy"
          url: "https://mail-archive.huebie.family"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Parents Mail Archive is down"
        - name: "📸 Pixelfed (External)"
          group: "External Services"
          url: "https://pixelfed.whiled.net"
          conditions:
            - "[STATUS] < 500"
          alerts:
            - type: "matrix"
              send-on-resolve: true
              description: "Pixelfed is down"
      alerting:
        matrix:
          server-url: "https://matrix.titusio.net"
          access-token: ${MATRIX_ACCESS_TOKEN}
          internal-room-id: "!VwFqlRnvLbETnPgWqI:titusio.net"
