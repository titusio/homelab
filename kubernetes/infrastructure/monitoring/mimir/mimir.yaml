apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mimir
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: mimir-distributed
      version: 6.0.6
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
  values:
    # values taken from the small deployment example in the official docs, 
    # see https://github.com/grafana/mimir/blob/main/operations/helm/charts/mimir-distributed/small.yaml
    global:
      extraEnv:
        - name: S3_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: mimir-s3-key
              key: access-key-id
        - name: S3_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: mimir-s3-key
              key: secret-access-key
        - name: S3_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: mimir-s3-key
              key: endpoint

    mimir:
      structuredConfig:
        common:
          storage:
            backend: s3
            s3:
              bucket_name: "mimir"
              endpoint: "${S3_ENDPOINT}"
              access_key_id: "${S3_ACCESS_KEY_ID}"
              secret_access_key: "${S3_SECRET_ACCESS_KEY}"
              http:
                insecure_skip_verify: true


    kafka:
      enabled: false

    alertmanager:
      persistentVolume:
        enabled: true
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
      statefulSet:
        enabled: true

    compactor:
      persistentVolume:
        size: 20Gi
      resources:
        requests:
          cpu: 200m
          memory: 512Mi

    distributor:
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 256Mi

    ingester:
      persistentVolume:
        size: 10Gi
      replicas: 3
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
      topologySpreadConstraints: {}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - ingester
              topologyKey: "kubernetes.io/hostname"

      zoneAwareReplication:
        topologyKey: "kubernetes.io/hostname"

    chunks-cache:
      enabled: true
      replicas: 3

    index-cache:
      enabled: true
      replicas: 3

    metadata-cache:
      enabled: true
      replicas: 3

    results-cache:
      enabled: true
      replicas: 3

    minio:
      enabled: false

    overrides_exporter:
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 64Mi

    querier:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi

    query_frontend:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi

    ruler:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi

    store_gateway:
      persistentVolume:
        size: 10Gi
      replicas: 3
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
      topologySpreadConstraints: {}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - store-gateway
              topologyKey: "kubernetes.io/hostname"
      zoneAwareReplication:
        topologyKey: "kubernetes.io/hostname"

    gateway:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
