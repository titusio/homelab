apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mimir
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: mimir-distributed
      version: 6.0.6
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
  values:
    # values taken from the small deployment example in the official docs, 
    # see https://github.com/grafana/mimir/blob/main/operations/helm/charts/mimir-distributed/small.yaml
    global:
      extraEnv:
        - name: S3_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: mimir-s3-key
              key: access-key-id
        - name: S3_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: mimir-s3-key
              key: secret-access-key
        - name: S3_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: mimir-s3-key
              key: endpoint

    mimir:
      structuredConfig:
        common:
          storage:
            backend: s3
            s3:
              bucketnames: "mimir"
              endpoint: "${S3_ENDPOINT}"
              access_key_id: "${S3_ACCESS_KEY_ID}"
              secret_access_key: "${S3_SECRET_ACCESS_KEY}"
              http:
                skip_verify: true


    alertmanager:
      persistentVolume:
        enabled: true
      replicas: 2
      resources:
        limits:
          memory: 1.4Gi
        requests:
          cpu: 1
          memory: 1Gi
      statefulSet:
        enabled: true

    compactor:
      persistentVolume:
        size: 20Gi
      resources:
        limits:
          memory: 2.1Gi
        requests:
          cpu: 1
          memory: 1.5Gi

    distributor:
      replicas: 2
      resources:
        limits:
          memory: 5.7Gi
        requests:
          cpu: 2
          memory: 4Gi

    ingester:
      persistentVolume:
        size: 30Gi
      replicas: 3
      resources:
        limits:
          memory: 12Gi
        requests:
          cpu: 3.5
          memory: 8Gi
      topologySpreadConstraints: {}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - ingester
              topologyKey: "kubernetes.io/hostname"

      zoneAwareReplication:
        topologyKey: "kubernetes.io/hostname"

    chunks-cache:
      enabled: true
      replicas: 3

    index-cache:
      enabled: true
      replicas: 3

    metadata-cache:
      enabled: true
      replicas: 3

    results-cache:
      enabled: true
      replicas: 3

    minio:
      enabled: false

    overrides_exporter:
      replicas: 1
      resources:
        limits:
          memory: 128Mi
        requests:
          cpu: 100m
          memory: 128Mi

    querier:
      replicas: 1
      resources:
        limits:
          memory: 5.6Gi
        requests:
          cpu: 2
          memory: 4Gi

    query_frontend:
      replicas: 1
      resources:
        limits:
          memory: 2.8Gi
        requests:
          cpu: 2
          memory: 2Gi

    ruler:
      replicas: 1
      resources:
        limits:
          memory: 2.8Gi
        requests:
          cpu: 1
          memory: 2Gi

    store_gateway:
      persistentVolume:
        size: 10Gi
      replicas: 3
      resources:
        limits:
          memory: 2.1Gi
        requests:
          cpu: 1
          memory: 1.5Gi
      topologySpreadConstraints: {}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - store-gateway
              topologyKey: "kubernetes.io/hostname"
      zoneAwareReplication:
        topologyKey: "kubernetes.io/hostname"

    gateway:
      replicas: 1
      resources:
        limits:
          memory: 731Mi
        requests:
          cpu: 1
          memory: 512Mi
