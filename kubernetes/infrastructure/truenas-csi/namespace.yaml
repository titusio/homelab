apiVersion: v1
kind: Namespace
metadata:
  name: truenas-csi
  labels:
    # Node DaemonSet needs privileged (hostPath, host namespaces, privileged
    # container) — same as longhorn-system.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
