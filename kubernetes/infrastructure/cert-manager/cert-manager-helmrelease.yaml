apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 30m
  chart:
    spec:
      chart: cert-manager
      version: v1.20.3
      sourceRef:
        kind: HelmRepository
        name: cert-manager
        namespace: cert-manager
  values:
    crds:
      enabled: true
    dns01RecursiveNameservers: "213.133.100.98:53,193.47.99.5:53,88.198.229.192:53"
    dns01RecursiveNameserversOnly: true
