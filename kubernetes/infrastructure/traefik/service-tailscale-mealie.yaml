apiVersion: v1
kind: Service
metadata:
  name: mealie-tailscale
  namespace: traefik
  annotations:
    external-dns.alpha.kubernetes.io/hostname: mealie.tituslab.dev
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app.kubernetes.io/name: traefik
  ports:
    - port: 443
      targetPort: 443
