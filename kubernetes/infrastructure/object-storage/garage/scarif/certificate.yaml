apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: garage-tls
  namespace: traefik
spec:
  secretName: garage-tls
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - garage-depot.tituslab.dev
    - garage-depot.titushome.dev
    - garage-vector.tituslab.dev
    - garage-vector.titushome.dev
