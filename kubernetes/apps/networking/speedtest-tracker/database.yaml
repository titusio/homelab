apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: speedtest-tracker-db
  namespace: networking
spec:
  instances: 3
  affinity:
    # corellia's cached postgresql:18.3 image is corrupt (exec format / I/O
    # errors); exclude it until the node's containerd cache is cleaned.
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                  - corellia
  storage:
    size: 3Gi
  bootstrap:
    initdb:
      database: speedtest-tracker
      owner: speedtest-tracker
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: speedtest-tracker-db-backup
