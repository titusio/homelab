apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: speedtest-tracker
  namespace: networking
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: apps
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: lscr.io/linuxserver/speedtest-tracker
              tag: 1.14.5
            env:
              environment:
              # - PUID=
              # - PGID=
              APP_URL: https://speed.tituslab.dev
              APP_KEY: 
                valueFrom:
                  secretKeyRef:
                    name: speedtest-tracker-secrets
                    key: appKey
              # Databse Config
              DB_CONNECTION: pgsql
              DB_PORT: 5432
              DB_DATABASE:
                valueFrom:
                  secretKeyRef:
                    name: speedtest-tracker-db-app
                    key: dbname
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: speedtest-tracker-db-app
                    key: username
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: speedtest-tracker-db-app
                    key: password
              DB_HOST: speedtest-tracker-db-rw.networking.svc.cluster.local
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthcheck
                    port: 80
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 3
    service:
      main:
        controller: main
        ports:
          http:
            port: 80
    route:
      main:
        parentRefs:
          - name: traefik-gateway
            namespace: traefik
            sectionName: websecure
        hostnames:
          - speed.tituslab.dev
        rules:
          - backendRefs:
              - name: speedtest-tracker
                port: 80
