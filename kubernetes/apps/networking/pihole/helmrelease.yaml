apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pihole
  namespace: networking
spec:
  interval: 30m
  chart:
    spec:
      chart: pihole
      version: 2.35.0
      sourceRef:
        kind: HelmRepository
        name: pihole-repo
        namespace: networking
  values:
    serviceDns:
      type: LoadBalancer
      annotations:
        lbipam.cilium.io/ips: "10.0.40.100"
        lbipam.cilium.io/sharing-key: pihole-svc
    serviceWeb:
      type: LoadBalancer
      annotations:
        "lbipam.cilium.io/ips": "10.0.40.100"
        lbipam.cilium.io/sharing-key: pihole-svc
    persistenceVolumeClaim:
      enabled: true