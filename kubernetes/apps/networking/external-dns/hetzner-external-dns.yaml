apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hetzner
  namespace: networking
spec:
  interval: 30m
  chart:
    spec:
      chart: external-dns
      version: 1.21.1 
      sourceRef:
        kind: HelmRepository
        name: hetzner-external-dns
        namespace: networking
  values:
    namespace: external-dns
    policy: sync
    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/mconfalonieri/external-dns-hetzner-webhook
          tag: "v0.12.1"
        env:
          - name: HETZNER_API_KEY
            valueFrom:
              secretKeyRef:
                name: hetzner-credentials
                key: api-key
          - name: USE_CLOUD_API
            value: "true"
        livenessProbe:
          httpGet:
            path: /health
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5

    extraArgs:
      - "--txt-prefix=reg-%{record_type}."
      - "--source=gateway-httproute"

    rbac:
      additionalPermissions:
        - apiGroups:
            - gateway.networking.k8s.io
          resources:
            - gateways
            - httproutes
          verbs:
            - get
            - watch
            - list
        - apiGroups:
            - ""
          resources:
            - namespaces
          verbs:
            - get
            - watch
            - list
