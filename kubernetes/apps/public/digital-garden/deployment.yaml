apiVersion: apps/v1
kind: Deployment
metadata:
  name: digital-garden
  namespace: public
spec:
  replicas: 1
  selector:
    matchLabels:
      app: digital-garden
  template:
    metadata:
      labels:
        app: digital-garden
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: static
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: static
          persistentVolumeClaim:
            claimName: digital-garden-static
---
apiVersion: v1
kind: Service
metadata:
  name: digital-garden
  namespace: public
spec:
  selector:
    app: digital-garden
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: digital-garden
  namespace: public
  annotations:
    external-dns.alpha.kubernetes.io/controller: "ignore"
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - garden.titusio.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: digital-garden
          port: 80
