apiVersion: batch/v1
kind: CronJob
metadata:
  name: digital-garden-generator
  namespace: public
spec:
  schedule: "5-59/10 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: digital-garden-generator
              image: git.titusio.net/titus/digital-garden:0.0.12
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  python3 obsidian_to_hugo.py /vault/BigBrain/Digital\ Garden/Plants --plots-src /vault/BigBrain/Digital\ Garden/Plots --attachments /vault/BigBrain/attachments
                  hugo build --destination /tmp/build 
                  rsync -a --delete /tmp/build/ /public/
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              volumeMounts:
                - name: vault
                  mountPath: /vault
                - name: static-site
                  mountPath: /public
          volumes:
            - name: vault
              persistentVolumeClaim:
                claimName: obsidian-cli-vault
            - name: static-site
              persistentVolumeClaim:
                claimName: digital-garden-static
          restartPolicy: OnFailure
