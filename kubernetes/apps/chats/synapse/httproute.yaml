apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: matrix-cors
  namespace: chats
spec:
  headers:
    accessControlAllowOriginList:
      - "*"
    accessControlAllowMethods:
      - GET
      - HEAD
      - POST
      - PUT
      - DELETE
      - OPTIONS
    accessControlAllowHeaders:
      - X-Requested-With
      - Content-Type
      - Authorization
      - Date
    accessControlExposeHeaders:
      - Synapse-Trace-Id
      - Server
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: synapse-matrix
  namespace: chats
  annotations:
    external-dns.alpha.kubernetes.io/controller: "ignore"
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - matrix.titusio.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /_matrix/client/api/v1/login
        - path:
            type: PathPrefix
            value: /_matrix/client/api/v1/refresh
        - path:
            type: PathPrefix
            value: /_matrix/client/api/v1/logout
        - path:
            type: PathPrefix
            value: /_matrix/client/r0/login
        - path:
            type: PathPrefix
            value: /_matrix/client/r0/refresh
        - path:
            type: PathPrefix
            value: /_matrix/client/r0/logout
        - path:
            type: PathPrefix
            value: /_matrix/client/v3/login
        - path:
            type: PathPrefix
            value: /_matrix/client/v3/refresh
        - path:
            type: PathPrefix
            value: /_matrix/client/v3/logout
        - path:
            type: PathPrefix
            value: /_matrix/client/unstable/login
        - path:
            type: PathPrefix
            value: /_matrix/client/unstable/refresh
        - path:
            type: PathPrefix
            value: /_matrix/client/unstable/logout
      backendRefs:
        - name: synapse-matrix-authentication-service
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Access-Control-Allow-Origin
                value: "*"
              - name: Access-Control-Allow-Methods
                value: "GET, HEAD, POST, PUT, DELETE, OPTIONS"
              - name: Access-Control-Allow-Headers
                value: "X-Requested-With, Content-Type, Authorization, Date"
              - name: Access-Control-Expose-Headers
                value: "Synapse-Trace-Id, Server"
      backendRefs:
        - name: synapse-synapse
          port: 8008
---
apiVersion: gateway.networking.k8s.io/v1
