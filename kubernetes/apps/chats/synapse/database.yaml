apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: synapse-db
  namespace: chats
spec:
  instances: 3
  affinity:
    # corellia's cached postgresql:18.3 image is corrupt (exec format / I/O
    # errors); exclude it until the node's containerd cache is cleaned.
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                  - corellia
  storage:
    storageClass: longhorn-single
    size: 10Gi
  bootstrap:
    initdb:
      database: synapse
      owner: synapse
      secret:
        name: synapse-db-credentials
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: synapse-db-backup
---
