apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: synapse-db
  namespace: chats
spec:
  instances: 3
  storage:
    size: 5Gi
  bootstrap:
    initdb:
      database: synapse
      owner: synapse
      secret:
        name: synapse-db-credentials
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mas-db
  namespace: chats
spec:
  instances: 3
  storage:
    size: 3Gi
  bootstrap:
    initdb:
      database: mas
      owner: mas
      secret:
        name: mas-db-credentials
