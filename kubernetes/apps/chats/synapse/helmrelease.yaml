apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: synapse
  namespace: chats
spec:
  interval: 30m
  chart:
    spec:
      chart: matrix-stack
      version: 26.5.1
      sourceRef:
        kind: HelmRepository
        name: ess
        namespace: chats
  values:
    serverName: titusio.net

    ingress:
      tlsEnabled: false

    synapse:
      ingress:
        host: matrix.titusio.net
      postgres:
        host: synapse-db-rw
        database: synapse
        user: synapse
        password:
          secret: synapse-db-credentials
          secretKey: password
        sslMode: require

    matrixAuthenticationService:
      ingress:
        host: maccount.titusio.net
      postgres:
        host: mas-db-rw
        database: mas
        user: mas
        password:
          secret: mas-db-credentials
          secretKey: password
        sslMode: require

    elementWeb:
      ingress:
        host: chat.titusio.net

    elementAdmin:
      ingress:
        host: madmin.titusio.net

    matrixRTC:
      enabled: false

