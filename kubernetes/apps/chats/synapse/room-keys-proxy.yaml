apiVersion: v1
kind: ConfigMap
metadata:
  name: room-keys-proxy
  namespace: chats
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 8080;

        # Wiredoor intercepts all upstream 404s and replaces them with its own
        # HTML error page (no CORS headers). Matrix uses 404 semantically for
        # "no backup found", so we convert it to 200 here so Wiredoor passes it
        # through. matrix-js-sdk checks errcode in the body, not the HTTP status.
        location = /_matrix/client/v3/room_keys/version {
          proxy_pass http://synapse-synapse.chats.svc.cluster.local:8008;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_set_header Host $http_host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_intercept_errors on;
          error_page 404 = @no_backup;
        }

        location @no_backup {
          default_type application/json;
          add_header Access-Control-Allow-Origin "*" always;
          add_header Access-Control-Allow-Methods "GET, HEAD, POST, PUT, DELETE, OPTIONS" always;
          add_header Access-Control-Allow-Headers "X-Requested-With, Content-Type, Authorization, Date" always;
          add_header Access-Control-Expose-Headers "Synapse-Trace-Id, Server" always;
          return 200 '{"errcode":"M_NOT_FOUND","error":"No backup found"}';
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: room-keys-proxy
  namespace: chats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: room-keys-proxy
  template:
    metadata:
      labels:
        app: room-keys-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: config
          configMap:
            name: room-keys-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: room-keys-proxy
  namespace: chats
spec:
  selector:
    app: room-keys-proxy
  ports:
    - port: 8080
      targetPort: 8080
