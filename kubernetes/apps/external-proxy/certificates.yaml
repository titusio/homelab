apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: alderaan-tls
  namespace: traefik
spec:
  secretName: alderaan-tls
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - immich.huebie.family
    - home.huebie.family
    - nextcloud.huebie.family
    - mail-archive.huebie.family

