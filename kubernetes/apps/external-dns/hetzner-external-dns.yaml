apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hetzner
  namespace: external-dns
spec:
  interval: 30m
  chart:
    spec:
      chart: external-dns
      version: 1.21.1 
      sourceRef:
        kind: HelmRepository
        name: hetzner-external-dns
        namespace: external-dns
  values:
    namespace: external-dns
    policy: sync
    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/mconfalonieri/external-dns-hetzner-webhook
          tag: "localbuild"
        env:
          - name: HETZNER_API_KEY
            valueFrom:
              secretKeyRef:
                name: hetzner-credentials
                key: api-key
        livenessProbe:
          httpGet:
            path: /health
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5

    extraArgs:
      - "--txt-prefix=reg-%{record_type}."
