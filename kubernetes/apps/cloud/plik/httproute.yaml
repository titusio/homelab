apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: plik
  namespace: cloud
  annotations:
    external-dns.alpha.kubernetes.io/controller: "ignore"
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - files.titusio.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: plik
          port: 8080
