apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: plik-db
  namespace: cloud
spec:
  instances: 3
  storage:
    size: 5Gi
  bootstrap:
    initdb:
      database: plik
      owner: plik
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: plik-db-backup
