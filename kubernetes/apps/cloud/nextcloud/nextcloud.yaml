apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: cloud
spec:
  interval: 30m
  chart:
    spec:
      chart: nextcloud
      version: 9.2.4
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: cloud
  values:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    service:
      annotations:
        traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
    nextcloud:
      host: cloud.titusio.net
      trustedDomains:
        - cloud.titusio.net
        - home.cloud.titusio.net
      configs:
        proxy.config.php: |-
          <?php
          $CONFIG = array(
            'trusted_proxies' => array('10.0.0.0/8'),
            'forwarded_for_headers' => array('HTTP_X_FORWARDED_FOR'),
            'overwrite.cli.url' => 'https://cloud.titusio.net',
            'overwriteprotocol' => 'https',
            // removed: breaks multi-domain access by forcing redirect to cloud.titusio.net
            // 'overwritehost' => 'cloud.titusio.net',
            'maintenance_window_start' => 1,
            'default_phone_region' => 'DE',
            'allow_local_remote_servers' => true,
          );
      existingSecret:
        enabled: true
        secretName: nextcloud-admin-credentials
        usernameKey: username
        passwordKey: password
    internalDatabase:
      enabled: false
    externalDatabase:
      enabled: true
      type: postgresql
      host: nextcloud-db-rw:5432
      database: nextcloud
      existingSecret:
        enabled: true
        secretName: nextcloud-db-credentials
        usernameKey: username
        passwordKey: password
    cronjob:
      enabled: true
    persistence:
      enabled: true
      size: 70Gi
    objectStore:
      s3:
        enabled: true
        host: scarif-vector.object-storage.svc.cluster.local
        port: 3900
        ssl: false
        usePathStyle: true
        region: garage
        existingSecret: nextcloud-s3-key
        secretKeys:
          accessKey: accessKeyId
          secretKey: secretAccessKey
          bucket: bucket
    collabora:
      enabled: true
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      collabora:
        aliasgroups:
          - host: "https://cloud.titusio.net:443"
        server_name: office.titusio.net
        extra_params: --o:ssl.enable=false --o:ssl.termination=true
        existingSecret:
          enabled: true
          secretName: nextcloud-admin-credentials
          usernameKey: username
          passwordKey: password
    redis:
      enabled: true
      auth:
        enabled: true
        existingSecret: nextcloud-redis-credentials
        existingSecretPasswordKey: redis-password

