apiVersion: batch/v1
kind: Job
metadata:
  name: wiredoor-register-nextcloud
  namespace: gateway
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      containers:
      - name: wiredoor-cli
        image: wiredoor/wiredoor-cli:v1.2.0
        command:
        - sh
        - -c
        - |
          set -e
          # wiredoor-cli uses cobra's Run instead of RunE, so failures inside
          # ExposeHTTP are printed as ERROR lines but the process always exits 0.
          # Until https://github.com/wiredoor/wiredoor-cli is fixed to use RunE,
          # we capture output and fail manually if any ERROR line is detected.
          run() { out=$("$@" 2>&1); echo "$out"; echo "$out" | grep -vq "^ERROR"; }
          wiredoor config --url=$WIREDOOR_URL --token=$WIREDOOR_TOKEN
          run wiredoor http nextcloud \
            --domain cloud.titusio.net \
            --backendHost traefik.traefik.svc.cluster.local \
            --port 80 --proto http
          run wiredoor http collabora \
            --domain office.titusio.net \
            --backendHost traefik.traefik.svc.cluster.local \
            --port 80 --proto http
        env:
        - name: WIREDOOR_URL
          valueFrom:
            secretKeyRef:
              name: wiredoor-config
              key: WIREDOOR_URL
        - name: WIREDOOR_TOKEN
          valueFrom:
            secretKeyRef:
              name: wiredoor-config
              key: TOKEN
      restartPolicy: OnFailure
