apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: photos
spec:
  interval: 1h
  chart:
    spec:
      chart: immich
      version: 0.12.0
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: photos
  values:
    immich:
      persistence:
        library:
          existingClaim: immich-library

    server:
      controllers:
        main:
          containers:
            main:
              image:
                tag: v2.7.5
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  cpu: 4000m
                  memory: 8Gi
              env:
                DB_HOSTNAME: immich-postgres-rw
                DB_PORT: "5432"
                DB_DATABASE_NAME: immich
                DB_USERNAME:
                  valueFrom:
                    secretKeyRef:
                      name: immich-db-credentials
                      key: username
                DB_PASSWORD:
                  valueFrom:
                    secretKeyRef:
                      name: immich-db-credentials
                      key: password
      persistence:
        thumbs:
          enabled: true
          existingClaim: immich-thumbs
          globalMounts:
            - path: /data/thumbs


    machine-learning:
      controllers:
        main:
          containers:
            main:
              image:
                tag: v2.7.5
              resources:
                requests:
                  cpu: 500m
                  memory: 512Mi
                limits:
                  cpu: 2000m
                  memory: 2Gi
      persistence:
        cache:
          enabled: true
          type: persistentVolumeClaim
          existingClaim: immich-ml-cache
          accessMode: ReadWriteOnce

    valkey:
      enabled: true
      persistence:
        data:
          type: persistentVolumeClaim
          size: 1Gi
          accessMode: ReadWriteOnce
