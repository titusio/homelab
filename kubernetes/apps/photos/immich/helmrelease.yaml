apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: photos
spec:
  interval: 1h
  chart:
    spec:
      chart: immich
      version: 0.12.0
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: photos
  values:
    immich:
      persistence:
        library:
          existingClaim: immich-library

    server:
      persistence:
        upload:
          enabled: true
          existingClaim: immich-upload
          globalMounts:
            - path: /data/upload
        encoded-video:
          enabled: true
          existingClaim: immich-encoded-video
          globalMounts:
            - path: /data/encoded-video
        backups:
          enabled: true
          existingClaim: immich-backups
          globalMounts:
            - path: /data/backups
        library:
          enabled: true
          existingClaim: immich-library
          globalMounts:
            - path: /data/library
        profile:
          enabled: true
          existingClaim: immich-profile
          globalMounts:
            - path: /data/profile
        thumbs:
          enabled: true
          existingClaim: immich-thumbs
          globalMounts:
            - path: /data/thumbs


    machine-learning:
      persistence:
        cache:
          enabled: true
          type: persistentVolumeClaim
          existingClaim: immich-ml-cache
          accessMode: ReadWriteOnce

    valkey:
      enabled: true
      persistence:
        data:
          type: persistentVolumeClaim
          size: 1Gi
          accessMode: ReadWriteOnce
