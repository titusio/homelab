apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: photos
spec:
  interval: 1h
  chart:
    spec:
      chart: immich
      version: 0.12.0
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: photos
  values:
    immich:
      persistence:
        library:
          existingClaim: immich-library

    server:
      persistence:
        thumbs:
          enabled: true
          existingClaim: immich-thumbs
          globalMounts:
            - path: /data/thumbs

    machine-learning:
      persistence:
        cache:
          enabled: true
          type: persistentVolumeClaim
          existingClaim: immich-ml-cache
          accessMode: ReadWriteOnce

    valkey:
      enabled: true
      persistence:
        data:
          type: persistentVolumeClaim
          size: 1Gi
          accessMode: ReadWriteOnce
