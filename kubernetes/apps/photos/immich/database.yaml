apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-postgres
  namespace: photos
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18-standard-trixie
  storage:
    size: 5Gi
  postgresql:
    shared_preload_libraries:
      - "vchord.so"

    # This extension is loaded via the Database CRD at cloudnative-pg-database.yaml
    extensions:
      - name: vchord
        image:
          reference: ghcr.io/tensorchord/vchord-scratch:pg18-v1.1.1
        dynamic_library_path:
          - /usr/lib/postgresql/18/lib
        extension_control_path:
          - /usr/share/postgresql/18/
  managed:
    roles:
      - name: immich
        superuser: true
        login: true
        passwordSecret:
          name: immich-db-credentials

  bootstrap:
    initdb:
      database: immich
      owner: immich
      secret:
        name: immich-db-credentials

  backup:
    barmanObjectStore:
      destinationPath: s3://outline-db-backup
      endpointURL: http://scarif-depot.object-storage.svc.cluster.local:3900
      s3Credentials:
        accessKeyId:
          name: immich-db-backup-ssd-s3
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: immich-db-backup-ssd-s3
          key: ACCESS_SECRET_KEY
        region:
          name: outline-db-backup-ssd-s3
          key: REGION
