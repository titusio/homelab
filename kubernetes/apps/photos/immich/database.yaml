apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-postgres
  namespace: photos
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:18-standard-trixie
  storage:
    storageClass: longhorn-single
    size: 5Gi
  postgresql:
    shared_preload_libraries:
      - "vchord.so"

    # This extension is loaded via the Database CRD at cloudnative-pg-database.yaml
    extensions:
      - name: vchord
        image:
          reference: ghcr.io/tensorchord/vchord-scratch:pg18-v1.1.1
        dynamic_library_path:
          - /usr/lib/postgresql/18/lib
        extension_control_path:
          - /usr/share/postgresql/18/
  managed:
    roles:
      - name: immich
        superuser: true
        login: true
        passwordSecret:
          name: immich-db-credentials

  bootstrap:
    initdb:
      database: immich
      owner: immich
      secret:
        name: immich-db-credentials

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: immich-db-backup
