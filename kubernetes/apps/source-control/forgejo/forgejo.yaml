apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: source-control
spec:
  interval: 1m
  chart:
    spec:
      chart: forgejo
      version: 17.1.3
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: source-control
  values:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    persistence:
      enabled: true
    postgresql-ha:
      enabled: false
    postgresql:
      enabled: false
    redis-cluster:
      enabled: false
    gitea:
      config:
        service:
          DISABLE_REGISTRATION: true
        server:
          DOMAIN: git.titusio.net
          ROOT_URL: https://git.titusio.net/
          SSH_DOMAIN: git.titusio.net
          SSH_PORT: 22
          DISABLE_SSH: false
      oauth:
        - name: 'Pocket-Id'
          provider: 'openidConnect'
          autoDiscoverUrl: 'https://id.titusio.net/.well-known/openid-configuration'
          existingSecret: forgejo-pocketid-secret
      admin:
        existingSecret: forgejo-admin-credentials
      additionalConfigSources:
        - secret:
            secretName: forgejo-db-config
        - secret:
            secretName: forgejo-valkey-config
      signing:
        enabled: true
        gpgHome: /data/git/.gnupg
        existingSecret: forgejo-gpg-key

