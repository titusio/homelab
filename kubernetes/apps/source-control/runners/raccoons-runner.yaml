apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: raccoons-runner
  namespace: source-control
spec:
  interval: 5m
  chart:
    spec:
      chart: forgejo-runner
      version: 0.7.6
      sourceRef:
        kind: HelmRepository
        name: wrenix
        namespace: source-control
  values:
    knownLastVersion: true
    runner:
      config:
        existingInitSecret: "raccoons-runner-secret"
        create: true
        file:
          runner:
            labels:
              - "ubuntu-22.04:docker://node:16-bullseye"

