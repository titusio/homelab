apiVersion: apps/v1
kind: Deployment
metadata:
  name: apprise
  namespace: monitoring
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apprise
  template:
    metadata:
      labels:
        app: apprise
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: apprise
              topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: config-init
          image: alpine:3
          command:
            - sh
            - -c
            - |
              apk add --no-cache gettext && \
              for f in /config-template/*.yml; do
                envsubst < "$f" > "/config/$(basename "$f")"
              done
          envFrom:
            - secretRef:
                name: apprise-matrix-tokens
          volumeMounts:
            - name: config-template
              mountPath: /config-template
              readOnly: true
            - name: config
              mountPath: /config
      containers:
        - name: apprise
          image: caronc/apprise:v1.10.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          env:
            - name: APPRISE_STATEFUL_MODE
              value: simple
            - name: APPRISE_WORKER_COUNT
              value: "1"
            - name: APPRISE_ADMIN
              value: "y"
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: plugin
              mountPath: /plugin
            - name: attach
              mountPath: /attach
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config-template
          configMap:
            name: apprise-config-template
        - name: config
          emptyDir: {}
        - name: plugin
          persistentVolumeClaim:
            claimName: apprise-plugin
        - name: attach
          persistentVolumeClaim:
            claimName: apprise-attach
        # nginx, gunicorn, and supervisord store pids/sockets here at runtime
        - name: tmp
          emptyDir:
            medium: Memory
