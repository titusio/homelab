apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: apprise
  namespace: monitoring
  annotations:
    external-dns.alpha.kubernetes.io/controller: "ignore"
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - apprise.tituslab.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /notify/
        - path:
            type: PathPrefix
            value: /get/
      backendRefs:
        - name: apprise
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: monitoring-oidc-auth
      backendRefs:
        - name: apprise
          port: 8000
