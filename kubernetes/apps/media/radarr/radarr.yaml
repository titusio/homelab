apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      chart: radarr 
      version: 1.4.0
      sourceRef:
        kind: HelmRepository
        name: media-servarr
        namespace: media
  values:
    secrets:
      - name: apiKey
        ref: radarr-api-secret
    deployment:
      volumes:
        config:
          persistentVolumeClaim:
            name: radarr-config
        downloads:
          persistentVolumeClaim:
            name: downloads
        film:
          nfs:
            server: "10.0.10.10"
            path: "/export/media/tv"

