apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      chart: radarr 
      version: 1.4.0
      sourceRef:
        kind: HelmRepository
        name: media-servarr
        namespace: media
  values:
    secrets:
      - name: apiKey
        ref: radarr-api-secret
    deployment:
      container:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
        config:
          persistentVolumeClaim:
            claimName: radarr-config
        downloads:
          persistentVolumeClaim:
            claimName: downloads
        film:
          nfs:
            server: "10.0.10.10"
            path: "/mnt/media/video/movies"

