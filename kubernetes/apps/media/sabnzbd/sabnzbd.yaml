apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sabnzbd
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      chart: sabnzbd
      version: 0.10.0
      sourceRef:
        kind: HelmRepository
        name: media-servarr
        namespace: media
  values:
    secrets:
      - name: apiKey
        ref: sabnzbd-credentials
      - name: nzbKey
        ref: sabnzbd-credentials
      - name: newsreaderServerUsername
        ref: sabnzbd-credentials
      - name: newsreaderServerPassword
        ref: sabnzbd-credentials
    application:
      config:
        secrets: ['apiKey', 'nzbKey', 'newsreaderServerUsername', 'newsreaderServerPassword']
        contents: |
          [misc]
          language = en
          queue_limit = 20
          port = 8080
          api_key = $apiKey
          nzb_key = $nzbKey
          download_dir = Downloads/incomplete
          complete_dir = Downloads/complete
          host_whitelist = sabnzbd.tituslab.dev
          [servers]
          [[Eweka]]
          name = Eweka
          displayname = CHANGEME_DISPLAYNAME
          host = news.eweka.nl
          port = 443
          username = $newsreaderServerUsername
          password = $newsreaderServerPassword
          connections = 50
          ssl = 1
          ssl_verify = 2
          enable = 1
          priority = 0
    deployment:
      volumes:
        config:
          persistentVolumeClaim:
            claimName: sabnzbd-config
        downloads:
          persistentVolumeClaim:
            claimName: downloads
    metrics:
      enabled: false
