apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: achew
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: apps
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: sirgibblets/achew
              tag: 1.11.0
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 3
    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 2Gi
        globalMounts:
          - path: /achew/app/config
    service:
      main:
        controller: main
        ports:
          http:
            port: 8000
    route:
      main:
        parentRefs:
          - name: traefik-gateway
            namespace: traefik
            sectionName: websecure
        hostnames:
          - audio-chapters.tituslab.dev
        rules:
          - backendRefs:
              - name: achew
                port: 8000
