apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: media
spec:
  interval: 1m
  chart:
    spec:
      chart: jellyfin
      version: 0.12.2
      sourceRef:
        kind: HelmRepository
        name: media-servarr
        namespace: media
  values:
    ingress:
      enabled: false  
    volumeMounts:
      film:
        nfs:
          server: "10.0.10.10"
          path: "/mnt/media/video/movies"
      television:
        nfs:
          server: "10.0.10.10"
          path: "/mnt/media/video/tv"
    persistentVolumeClaims:
      jellyfin-config:
        accessMode: 'ReadWriteOnce'
        requestStorage: '10Gi'
