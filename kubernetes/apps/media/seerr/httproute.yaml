apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seer
  namespace: media
  annotations:
    external-dns.alpha.kubernetes.io/controller: "ignore"
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - requests.tituslab.dev
    - requests.tituscloud.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: seer-seer
          port: 80
