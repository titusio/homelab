apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
  namespace: media
spec:
  interval: 10m
  chart:
    spec:
      chart: seerr-chart
      version: 3.7.0
      sourceRef:
        kind: HelmRepository
        name: seerr
        namespace: media
  values:
    extraEnv:
      - name: DB_TYPE
        value: postgres
      - name: DB_HOST
        value: seerr-db-rw
      - name: DB_PORT
        value: "5432"
      - name: DB_NAME
        value: seerr
      - name: DB_POOL_SIZE
        value: "10"
      - name: DB_LOG_QUERIES
        value: "false"
      - name: DB_USER
        valueFrom:
          secretKeyRef:
            name: seerr-db-app
            key: username
      - name: DB_PASS
        valueFrom:
          secretKeyRef:
            name: seerr-db-app
            key: password
