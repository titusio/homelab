apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lidarr
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      chart: lidarr
      version: 1.5.1
      sourceRef:
        kind: HelmRepository
        name: media-servarr
        namespace: media
  values:
    secrets:
      - name: apiKey
        ref: lidarr-api-secret
    deployment:
      container:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 1Gi
      volumes:
        config:
          persistentVolumeClaim:
            claimName: lidarr-config
        downloads:
          persistentVolumeClaim:
            claimName: downloads
        music:
          nfs:
            server: "10.0.10.10"
            path: "/mnt/media/audio/music"
