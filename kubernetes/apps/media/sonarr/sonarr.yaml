apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      chart: sonarr
      version: 0.12.3
      sourceRef:
        kind: HelmRepository
        name: media-servarr
        namespace: media
  values:
    secrets:
      - name: apiKey
        ref: sonarr-api-secret
    deployment:
      container:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 1Gi
      volumes:
        config:
          persistentVolumeClaim:
            claimName: sonarr-config
        downloads:
          persistentVolumeClaim:
            claimName: downloads
        tv:
          nfs:
            server: "10.0.10.10"
            path: "/mnt/media/video/tv"

