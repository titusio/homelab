apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      chart: sonarr
      version: 0.12.1
      sourceRef:
        kind: HelmRepository
        name: media-servarr
        namespace: media
  values:
    secrets:
      - name: apiKey
        ref: sonarr-api-secret
    deployment:
      volumes:
        config:
          persistentVolumeClaim:
            claimName: radarr-config
        downloads:
          persistentVolumeClaim:
            claimName: downloads
        tv:
          nfs:
            server: "10.0.10.10"
            path: "/export/media/tv"

