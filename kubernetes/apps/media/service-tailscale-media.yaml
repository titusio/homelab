apiVersion: v1
kind: Service
metadata:
  name: media-tailscale
  namespace: traefik
  annotations:
    # add new home service hostnames here as comma-separated values
    external-dns.alpha.kubernetes.io/hostname: radarr.tituslab.dev,sonarr.tituslab.dev,prowlarr.tituslab.dev,sabnzbd.tituslab.dev,shelf.tituslab.dev,abs.tituslab.dev,audiobooks.tituslab.dev,audiobookshelf.tituslab.dev,profiles.tituslab.dev
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app.kubernetes.io/name: traefik
  ports:
    - port: 443
      targetPort: 443
