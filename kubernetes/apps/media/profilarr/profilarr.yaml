apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: profilarr 
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      chart: profilarr
      version: 0.1.2
      sourceRef:
        kind: HelmRepository
        name: media-servarr
        namespace: media
  values:
    deployment:
      container:
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        image:
          repository: ghcr.io/dictionarry-hub/profilarr
          tag: 2.0.9
        env:
          - name: 'AUTH'
            value: 'off'
          - name: 'ORIGIN'
            value: 'https://profiles.tituslab.dev'
      volumes:
        config:
          persistentVolumeClaim:
            claimName: 'profilarr-config'

