apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: profilarr 
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      chart: profilarr
      version: 0.1.1
      sourceRef:
        kind: HelmRepository
        name: media-servarr
        namespace: media
  values:
    deployment:
      container:
        image:
          repository: ghcr.io/dictionarry-hub/profilarr
          tag: 2.0.4
        env:
          - name: 'AUTH'
            value: 'off'
      volumes:
        config:
          persistentVolumeClaim:
            claimName: 'profilarr-config'

