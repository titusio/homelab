apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: audiobookshelf
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      chart: bdclark
      version: 0.1.1
      sourceRef:
        kind: HelmRepository
        name: bdclark
        namespace: media
  values:
    mediaMounts:
      - name: audiobooks
        existingClaim: media-audiobooks
        mountPath: /
        readOnly: true
      - name: podcasts
        existingClaim: media-podcasts
        mountPath: /podcasts
        readOnly: true
