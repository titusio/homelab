apiVersion: batch/v1
kind: Job
metadata:
  name: wiredoor-register-audiobookshelf
  namespace: gateway
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      containers:
      - name: wiredoor-cli
        image: wiredoor/wiredoor-cli:v1.2.0
        command:
        - sh
        - -c
        - |
          wiredoor config --url=$WIREDOOR_URL --token=$WIREDOOR_TOKEN
          wiredoor http abs \
            --domain abs.tituscloud.dev \
            --backendHost traefik.traefik.svc.cluster.local \
            --port 8088 --proto http
          wiredoor http audiobooks \
            --domain audiobooks.tituscloud.dev \
            --backendHost traefik.traefik.svc.cluster.local \
            --port 8088 --proto http
        env:
        - name: WIREDOOR_URL
          valueFrom:
            secretKeyRef:
              name: wiredoor-config
              key: WIREDOOR_URL
        - name: WIREDOOR_TOKEN
          valueFrom:
            secretKeyRef:
              name: wiredoor-config
              key: TOKEN
      restartPolicy: OnFailure
