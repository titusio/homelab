apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: change-detection
  namespace: productivity
spec:
  interval: 5m
  chart:
    spec:
      chart: changedetection
      version: 1.1.14
      sourceRef:
        kind: HelmRepository
        name: helmforgedev
        namespace: apps
  values:
    changedetection:
      baseUrl: 'https://changes.tituslab.dev'
      fetchWorkers: 4

    browser:
      enabled: true
      resources:
        requests:
          memory: 512Mi
          cpu: 250m
        limits:
          memory: 2Gi
          cpu: 1000m

    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m

    persistence:
      enabled: true
      size: 20Gi
