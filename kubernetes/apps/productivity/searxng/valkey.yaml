apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: searxng-valkey
  namespace: productivity
spec:
  interval: 5m
  chart:
    spec:
      chart: valkey
      version: 0.9.4
      sourceRef:
        kind: HelmRepository
        name: valkey
        namespace: valkey
  values:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    auth:
      enabled: true
      usersExistingSecret: "valkey-users"
      aclUsers:
        default:
          permissions: "~* &* +@all"
          passwordKey: default-password
 
