apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: searxng
  namespace: productivity
spec:
  interval: 5m
  chart:
    spec:
      chart: searxng
      version: 1.1.1
      sourceRef:
        kind: HelmRepository
        name: kubitodev
        namespace: productivity
  values:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    replicaCount: 3
    env:
      - name: SEARXNG_VALKEY_URL
        valueFrom:
          secretKeyRef:
            name: searxng-secrets
            key: SEARXNG_VALKEY_URL
