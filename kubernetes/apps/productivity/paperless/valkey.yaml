apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-valkey
  namespace: productivity
spec:
  interval: 30m
  chart:
    spec:
      chart: valkey
      version: 1.18.0
      sourceRef:
        kind: HelmRepository
        name: valkey
        namespace: valkey
  values: 
    auth:
      enabled: true
      usersExistingSecret: "paperless-valkey-credentials"
      aclUsers:
        default:
          permissions: "~* &* +@all"
        readonly:
          permissions: "~* -@all +@read +ping +info"
          passwordKey: "password"  
