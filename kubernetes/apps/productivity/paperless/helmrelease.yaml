apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless
  namespace: productivity
spec:
  interval: 30m
  chart:
    spec:
      chart: paperless-ngx
      version: 0.3.19
      sourceRef:
        kind: HelmRepository
        name: paperless
        namespace: productivity
  values:
    resources:
      limits:
        cpu: 4000m
        memory: 2Gi
      requests:
        cpu: 250m
        memory: 512Mi
    startupProbe:
      httpGet:
        path: /
        port: http
      failureThreshold: 30
      periodSeconds: 10
    livenessProbe:
      httpGet:
        path: /
        port: http
      failureThreshold: 5
      periodSeconds: 20
    valkey:
      fullnameOverride: paperless-paperless-ngx-valkey
    postgresql:
      primary:
        resources:
          limits:
            cpu: 500m
            memory: 192Mi
          requests:
            cpu: 100m
            memory: 128Mi
    config:
      url: https://paperless.tituslab.dev
      database:
        host: postgres-database-rw
        name: paperless
        user: paperless
        existingSecret:
          name: paperless-db-credentials
          passKey: password
