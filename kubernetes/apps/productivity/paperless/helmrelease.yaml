apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless
  namespace: productivity
spec:
  interval: 30m
  chart:
    spec:
      chart: paperless-ngx
      version: 0.3.19
      sourceRef:
        kind: HelmRepository
        name: paperless
        namespace: productivity
  values:
    valkey:
      fullnameOverride: paperless-paperless-ngx-valkey
    config:
      url: https://paperless.tituslab.dev
      database:
        host: postgres-database-rw
        name: paperless
        user: paperless
        existingSecret:
          name: paperless-db-credentials
          passKey: password
