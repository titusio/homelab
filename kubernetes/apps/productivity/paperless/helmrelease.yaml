apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless
  namespace: productivity
spec:
  interval: 30m
  chart:
    spec:
      chart: paperless-ngx
      version: 0.3.19
      sourceRef:
        kind: HelmRepository
        name: paperless
        namespace: productivity
  valuesFrom:
    - kind: Secret
      name: paperless-valkey-credentials
      valuesKey: redisUrl
      targetPath: config.redis.url
  values:
    valkey:
      internal: false
    config:
      database:
        host: postgres-database-rw
        name: paperless
        user: paperless
        existingSecret:
          name: paperless-db-credentials
          passKey: password
