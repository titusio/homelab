apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: karakeep
  namespace: productivity
spec:
  interval: 30m
  chart:
    spec:
      chart: karakeep
      version: 1.2.6
      sourceRef:
        kind: HelmRepository
        name: helmforgedev
        namespace: apps
  values:
    karakeep:
      nextAuthUrl: "https://karakeep.tituslab.dev"
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
    meilisearch:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
    chromium:
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2Gi
      extraEnv:
        - name: OAUTH_WELLKNOWN_URL
          value: "https://id.titusio.net/.well-known/openid-configuration"
        - name: OAUTH_PROVIDER_NAME
          value: "Pocket-Id"
        - name: OAUTH_ALLOW_DANGEROUS_EMAIL_ACCOUNT_LINKING
          value: "true"
        - name: OAUTH_CLIENT_ID
          valueFrom:
            secretKeyRef: 
              name: karakeep-oidc-secret
              key: clientId
        - name: OAUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef: 
              name: karakeep-oidc-secret
              key: clientSecret

