apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: linkwarden-db
  namespace: productivity
spec:
  instances: 3
  storage:
    size: 3Gi
  bootstrap:
    initdb:
      database: linkwarden
      owner: linkwarden
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: linkwarden-db-backup
