apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkwarden-meilisearch
  namespace: productivity
spec:
  interval: 5m
  chart:
    spec:
      chart: meilisearch
      version: 0.32.0
      sourceRef:
        kind: HelmRepository
        name: meilisearch
        namespace: productivity
  values:
    replicaCount: 2
    auth:
      existingMasterKeySecret: meilisearch-secrets
    environment:
      MEILI_ENV: "production"
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: meilisearch-linkwarden-meilisearch
            topologyKey: kubernetes.io/hostname

