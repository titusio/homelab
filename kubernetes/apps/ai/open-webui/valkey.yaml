apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui-valkey
  namespace: ai
spec:
  interval: 5m
  chart:
    spec:
      chart: valkey
      version: 0.10.0
      sourceRef:
        kind: HelmRepository
        name: valkey
        namespace: valkey
  values:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    auth:
      enabled: true
      usersExistingSecret: "open-webui-valkey"
      aclUsers:
        default:
          permissions: "~* &* +@all"
          passwordKey: default-password
