apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: open-webui-db
  namespace: ai
spec:
  instances: 3
  # standard image bundles pgvector, used for Open WebUI's vector store
  imageName: ghcr.io/cloudnative-pg/postgresql:18-standard-trixie
  storage:
    storageClass: longhorn-single
    size: 8Gi
  bootstrap:
    initdb:
      database: open-webui
      owner: open-webui
      # Create the pgvector extension in the app database as the bootstrap
      # superuser so the (non-superuser) open-webui role can use it.
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS vector;
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: open-webui-db-backup
