apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: litellm-db
  namespace: ai
spec:
  instances: 3
  storage:
    storageClass: longhorn-single
    size: 5Gi
  bootstrap:
    initdb:
      database: litellm
      owner: litellm
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: litellm-db-backup
