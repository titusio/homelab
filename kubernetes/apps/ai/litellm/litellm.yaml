apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
  namespace: ai
spec:
  interval: 10m
  chart:
    spec:
      chart: litellm-helm
      version: 1.91.1
      sourceRef:
        kind: HelmRepository
        name: litellm
        namespace: ai
  values:
    fullnameOverride: litellm
    masterkeySecretName: litellm-secret
    masterkeySecretKey: masterkey
    # Loads provider API keys (ANTHROPIC_API_KEY, OPENAI_API_KEY) as env vars
    environmentSecrets:
      - litellm-provider-keys
    db:
      useExisting: true
      endpoint: litellm-db-rw
      database: litellm
      secret:
        name: litellm-db-app
        usernameKey: username
        passwordKey: password
    proxy_config:
      model_list:
        # Provider API keys come from the litellm-provider-keys secret, loaded
        # via environmentSecrets above.
        # --- Anthropic ---
        - model_name: claude-opus-4-8
          litellm_params:
            model: anthropic/claude-opus-4-8
            api_key: os.environ/ANTHROPIC_API_KEY
        - model_name: claude-sonnet-4-6
          litellm_params:
            model: anthropic/claude-sonnet-4-6
            api_key: os.environ/ANTHROPIC_API_KEY
        - model_name: claude-haiku-4-5
          litellm_params:
            model: anthropic/claude-haiku-4-5
            api_key: os.environ/ANTHROPIC_API_KEY
        # --- OpenAI ---
        - model_name: gpt-5
          litellm_params:
            model: openai/gpt-5
            api_key: os.environ/OPENAI_API_KEY
        - model_name: gpt-5-mini
          litellm_params:
            model: openai/gpt-5-mini
            api_key: os.environ/OPENAI_API_KEY
        - model_name: gpt-4o
          litellm_params:
            model: openai/gpt-4o
            api_key: os.environ/OPENAI_API_KEY
      # Redis cache backed by the litellm-valkey release
      litellm_settings:
        cache: true
        cache_params:
          type: redis
          host: os.environ/REDIS_HOST
          port: os.environ/REDIS_PORT
          password: os.environ/REDIS_PASSWORD
    envVars:
      REDIS_HOST: litellm-valkey
      REDIS_PORT: "6379"
    extraEnvVars:
      - name: REDIS_PASSWORD
        valueFrom:
          secretKeyRef:
            name: valkey-users
            key: default-password
