apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
  namespace: home
spec:
  interval: 30m
  chart:
    spec:
      chart: mealie
      version: 3.0.2
      sourceRef:
        kind: HelmRepository
        name: mealie
        namespace: home
  values:
    # use the cnpg operator
    cluster:
      enabled: true
    env:
      # superuser required for backup restore (SET session_replication_role = 'replica')
      - name: POSTGRES_USER
        valueFrom:
          secretKeyRef:
            name: mealie-cluster-superuser
            key: username
      - name: POSTGRES_PASSWORD
        valueFrom:
          secretKeyRef:
            name: mealie-cluster-superuser
            key: password
