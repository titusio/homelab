apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
  namespace: home
spec:
  interval: 30m
  chart:
    spec:
      chart: mealie
      version: 3.0.2
      sourceRef:
        kind: HelmRepository
        name: mealie
        namespace: home
  values:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # use the cnpg operator
    cluster:
      enabled: true
      cluster:
        instances: 3
