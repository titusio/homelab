apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
  namespace: home
spec:
  interval: 30m
  chart:
    spec:
      chart: mealie
      version: 3.0.2
      sourceRef:
        kind: HelmRepository
        name: mealie
        namespace: home
  values:
    # use the cnpg operator
    cluster:
      enabled: true
      cluster:
        bootstrap:
          initdb:
            postInitApplicationSQL:
              - "ALTER ROLE mealie SUPERUSER;"
