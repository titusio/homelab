apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
  namespace: home
spec:
  interval: 30m
  chart:
    spec:
      chart: mealie
      version: 3.0.2
      sourceRef:
        kind: HelmRepository
        name: mealie
        namespace: home
  values:
    service:
      main:
        controller: main
        type: LoadBalancer
        loadBalancerClass: tailscale
        annotations:
          external-dns.alpha.kubernetes.io/hostname: mealie.tituslab.dev
        ports:
          http:
            port: 9000
    # use the cnpg operator
    cluster:
      enabled: true
